services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      ENV: ${ENV:-dev}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://postgres:postgres@postgres:5432/mana}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_API_KEY_ENV: ${LLM_API_KEY_ENV:-GEMINI_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-gemini-2.0-flash-lite}
      LLM_FALLBACK_MODELS_CSV: ${LLM_FALLBACK_MODELS_CSV:-}
      LLM_FALLBACKS_JSON: ${LLM_FALLBACKS_JSON:-[]}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:-change-me-in-production}
      AUTH_TOKEN_EXPIRE_MINUTES: ${AUTH_TOKEN_EXPIRE_MINUTES:-60}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      ENFORCE_ENCRYPTION: ${ENFORCE_ENCRYPTION:-false}
      ENFORCE_COPYRIGHT_CONTROLS: ${ENFORCE_COPYRIGHT_CONTROLS:-true}
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
      - ./requirements.txt:/app/requirements.txt:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: python -m app.core.worker
    environment:
      ENV: ${ENV:-dev}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://postgres:postgres@postgres:5432/mana}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_API_KEY_ENV: ${LLM_API_KEY_ENV:-GEMINI_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-gemini-2.0-flash-lite}
      LLM_FALLBACK_MODELS_CSV: ${LLM_FALLBACK_MODELS_CSV:-}
      LLM_FALLBACKS_JSON: ${LLM_FALLBACKS_JSON:-[]}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:-change-me-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      ENFORCE_ENCRYPTION: ${ENFORCE_ENCRYPTION:-false}
      ENFORCE_COPYRIGHT_CONTROLS: ${ENFORCE_COPYRIGHT_CONTROLS:-true}
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
      - ./requirements.txt:/app/requirements.txt:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    image: node:20-alpine
    working_dir: /frontend
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_CORE_API_BASE_URL: ${VITE_CORE_API_BASE_URL:-http://localhost:8000}
      VITE_API_USERNAME: ${VITE_API_USERNAME:-analyst}
      VITE_API_PASSWORD: ${VITE_API_PASSWORD:-analyst123}
    volumes:
      - ./ui:/frontend
      - frontend_node_modules:/frontend/node_modules
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mana}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-mana}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    profiles:
      - search
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  frontend_node_modules:
