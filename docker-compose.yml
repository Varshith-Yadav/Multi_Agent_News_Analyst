services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ENV: prod
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://postgres:postgres@postgres:5432/mana}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.x.ai/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_API_KEY_ENV: ${LLM_API_KEY_ENV:-XAI_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-grok-4}
      LLM_FALLBACK_MODELS_CSV: ${LLM_FALLBACK_MODELS_CSV:-grok-4-latest,grok-3-mini}
      LLM_FALLBACKS_JSON: ${LLM_FALLBACKS_JSON:-[]}
      LLM_ENABLE_STUB_FALLBACK: ${LLM_ENABLE_STUB_FALLBACK:-true}
      XAI_API_KEY: ${XAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost}
      FRONTEND_ORIGINS_CSV: ${FRONTEND_ORIGINS_CSV:-http://localhost,http://127.0.0.1}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:?set AUTH_SECRET_KEY in .env}
      AUTH_TOKEN_EXPIRE_MINUTES: ${AUTH_TOKEN_EXPIRE_MINUTES:-60}
      AUTH_SEED_USERS_JSON: ${AUTH_SEED_USERS_JSON:?set AUTH_SEED_USERS_JSON in .env}
      ALLOW_PUBLIC_SIGNUP: ${ALLOW_PUBLIC_SIGNUP:-false}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?set ENCRYPTION_KEY in .env}
      ENFORCE_ENCRYPTION: ${ENFORCE_ENCRYPTION:-true}
      ENFORCE_COPYRIGHT_CONTROLS: ${ENFORCE_COPYRIGHT_CONTROLS:-true}
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: python -m app.core.worker
    environment:
      ENV: prod
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://postgres:postgres@postgres:5432/mana}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.x.ai/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_API_KEY_ENV: ${LLM_API_KEY_ENV:-XAI_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-grok-4}
      LLM_FALLBACK_MODELS_CSV: ${LLM_FALLBACK_MODELS_CSV:-grok-4-latest,grok-3-mini}
      LLM_FALLBACKS_JSON: ${LLM_FALLBACKS_JSON:-[]}
      LLM_ENABLE_STUB_FALLBACK: ${LLM_ENABLE_STUB_FALLBACK:-true}
      XAI_API_KEY: ${XAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:?set AUTH_SECRET_KEY in .env}
      AUTH_SEED_USERS_JSON: ${AUTH_SEED_USERS_JSON:?set AUTH_SEED_USERS_JSON in .env}
      ALLOW_PUBLIC_SIGNUP: ${ALLOW_PUBLIC_SIGNUP:-false}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?set ENCRYPTION_KEY in .env}
      ENFORCE_ENCRYPTION: ${ENFORCE_ENCRYPTION:-true}
      ENFORCE_COPYRIGHT_CONTROLS: ${ENFORCE_COPYRIGHT_CONTROLS:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        VITE_CORE_API_BASE_URL: ${VITE_CORE_API_BASE_URL:-/api}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mana}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-mana}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
